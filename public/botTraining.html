<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot Training</title>
    <link rel="icon" type="image/jpeg" href="assets/images/CloakHood.jpg" />
    <link rel="stylesheet" href="colors.css" />
    <link rel="stylesheet" href="ui.css" />
    <style>
      :root {
        --deep-green: var(--CG-deep-green);
        --deep-purple: var(--CG-deep-purple);
        --deep-gold: var(--CG-deep-gold);
        --light-gold: var(--CG-light-gold);
      }

      body {
        margin: 0;
        font-family: var(--cg-font-family);
        font-weight: var(--cg-font-weight-regular);
        background-color: var(--deep-green);
        color: var(--light-gold);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: url('assets/images/Background.png') center/cover no-repeat;
        filter: brightness(0.8) contrast(0.65);
        z-index: -1;
      }

      [hidden] {
        display: none !important;
      }

      .page-shell {
        flex: 1;
        padding: 32px 24px 48px;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
      }

      .page-container {
        width: 100%;
        max-width: 1100px;
        background: rgba(24, 9, 38, 0.85);
        border: 4px solid var(--deep-gold);
        border-radius: 12px;
        padding: 32px;
        box-sizing: border-box;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      }

      .page-title {
        margin: 0 0 24px;
        font-size: 34px;
        color: var(--light-gold);
        text-align: center;
      }

      .tab-header {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
        border-bottom: 3px solid rgba(184, 134, 11, 0.45);
      }

      .tab-button {
        background: none;
        border: none;
        color: rgba(255, 215, 0, 0.65);
        font-size: 22px;
        font-weight: var(--cg-button-font-weight);
        padding: 12px 16px;
        cursor: pointer;
        position: relative;
        transition: color 0.2s ease;
      }

      .tab-button::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -3px;
        height: 3px;
        background: transparent;
        transition: background 0.2s ease;
      }

      .tab-button.active {
        color: var(--light-gold);
      }

      .tab-button.active::after {
        background: var(--deep-gold);
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="page-container">
        <h1 class="page-title">Bot Training</h1>
        <div class="tab-header" role="tablist" aria-label="Bot training sections">
          <button class="tab-button active" data-tab="simulation" role="tab" aria-selected="true" aria-controls="simulationTab">Simulation</button>
          <button class="tab-button" data-tab="training" role="tab" aria-selected="false" aria-controls="trainingTab">Training</button>
          <button class="tab-button" data-tab="batch" role="tab" aria-selected="false" aria-controls="batchTab">Batch</button>
        </div>
        <div id="simulationTab" class="tab-panel active" role="tabpanel" aria-labelledby="simulationTabButton"></div>
        <div
          id="trainingTab"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="trainingTabButton"
          hidden
        ></div>
        <div
          id="batchTab"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="batchTabButton"
          hidden
        ></div>
      </div>
    </div>

    <script src="js/botTraining.js" type="module"></script>
  </body>
</html>
